<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demon Hunter Go — Web MVP</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQvPDGqwIBFwCqnUxE4dLAQ0aQ7cEPU="
      crossorigin=""
    />
    <link rel="stylesheet" href="./src/styles.css?v=20260427-mage-location" />
  </head>
  <body>
    <div id="app-shell">
      <aside class="sidebar">
        <header class="brand-panel">
          <div class="sigil">✦</div>
          <div>
            <h1>Demon Hunter Go</h1>
            <p>Ritual-Prototyp</p>
          </div>
        </header>

        <section class="stats-grid" aria-label="Spielwerte">
          <div class="stat-card"><span>Level</span><strong id="player-level">1</strong></div>
          <div class="stat-card"><span>EXP</span><strong id="player-exp">0</strong></div>
          <div class="stat-card"><span>Schritte</span><strong id="today-steps">0</strong></div>
          <div class="stat-card"><span>Biome</span><strong id="current-biome">Stadt</strong></div>
        </section>

        <nav class="tabs" aria-label="App Bereiche">
          <button class="tab-button active" data-tab="rituals">Rituale</button>
          <button class="tab-button" data-tab="habits">Habits</button>
          <button class="tab-button" data-tab="todos">To-dos</button>
          <button class="tab-button" data-tab="daily">Täglich</button>
          <button class="tab-button" data-tab="gratitude">Dankbarkeit</button>
          <button class="tab-button" data-tab="collection">Sammlung</button>
          <button class="tab-button" data-tab="health">Health</button>
        </nav>

        <main class="panel-stack">
          <section id="tab-rituals" class="tab-panel active"></section>
          <section id="tab-habits" class="tab-panel"></section>
          <section id="tab-todos" class="tab-panel"></section>
          <section id="tab-daily" class="tab-panel"></section>
          <section id="tab-gratitude" class="tab-panel"></section>
          <section id="tab-collection" class="tab-panel"></section>
          <section id="tab-health" class="tab-panel"></section>
        </main>
      </aside>

      <section class="map-stage">
        <div id="map"></div>
        <div class="map-overlay top-left">
          <button id="locate-me-button" class="primary-button">Standort nutzen</button>
          <button id="simulate-step-button" class="ghost-button">Editor-Schritt</button>
          <button id="scan-button" class="primary-button">Nach Dämonen suchen</button>
        </div>
        <div class="map-overlay bottom-left" id="walk-summary">
          <strong>Ritualpfad</strong>
          <span id="walk-status">Noch nicht begonnen.</span>
        </div>
      </section>
    </div>

    <dialog id="encounter-dialog" class="encounter-dialog"></dialog>
    <div id="toast-root" class="toast-root" aria-live="polite"></div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="./src/main.js?v=20260427-mage-location"></script>
  </body>
</html>
